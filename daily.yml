import smtplib

from email.mime.text import MIMEText
from email.mime.multipart import MIMEMultipart

from config.settings import sender_email, password


def send_email(message, receiver):

    email = MIMEMultipart()

    email["From"] = sender_email
    email["To"] = receiver
    email["Subject"] = "Daily Motivational Quote"


    email.attach(
        MIMEText(message, "plain")
    )


    try:
        server = smtplib.SMTP(
            "smtp.gmail.com",
            587
        )

        server.starttls()

        server.login(
            sender_email,
            password
        )


        server.sendmail(
            sender_email,
            receiver,
            email.as_string()
        )


        server.quit()

        print("Email sent:", receiver)


    except Exception as e:
        print("Email error:", e)






import schedule
import time


from services.quote import get_quote
from services.email_sender import send_email

from config.settings import receivers



def job():

    print("Sending email...")

    quote = get_quote()

    for receiver in receivers:
        send_email(
            quote,
            receiver
        )



print("Daily quote scheduler started")


# test run
job()


# automatic daily run
schedule.every().day.at("11:56").do(job)



while True:

