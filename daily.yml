import requests


def get_quote():

    try:
        response = requests.get(
            "https://zenquotes.io/api/random",
            timeout=10
        )

        response.raise_for_status()

        data = response.json()

        quote = data[0]["q"]
        author = data[0]["a"]

        return f"""
Today's Quote:

"{quote}"

- {author}
"""

    except Exception as e:
        return "Could not fetch quote: " + str(e)


